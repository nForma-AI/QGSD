\* formal/tla/MCconvergence.cfg
\* TLC model for QGSDConvergence.tla — circuit breaker state persistence.
\* Safety-only check: no liveness property (small state space, auto workers safe).
\*
\* Run: node bin/run-oscillation-tlc.cjs MCconvergence  (requires Java >=17 + tla2tools.jar)
SPECIFICATION Spec
INVARIANT TypeOK
INVARIANT ResolvedAtWriteOnce
INVARIANT LogBeforeDelete
INVARIANT HaikuUnavailableNoCorruption
PROPERTY ConvergenceEventuallyResolves
CHECK_DEADLOCK FALSE
