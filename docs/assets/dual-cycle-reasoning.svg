  <rect x="60" y="1228" width="1280" height="192" rx="16" fill="#100c04" stroke="#92400e" stroke-width="1.5" stroke-dasharray="8,5" filter="url(#s2)"/>

  <!-- Auto path label (top left) -->
  <rect x="84" y="1252" width="200" height="28" rx="6" fill="#1a1200" stroke="#713f12" stroke-width="1"/>
  <text x="184" y="1271" text-anchor="middle" font-size="11" fill="#854d0e">AUTO by default</text>

  <!-- Manual fallback label (top right) -->
  <rect x="1116" y="1252" width="200" height="28" rx="6" fill="#1a1200" stroke="#713f12" stroke-width="1"/>
  <text x="1216" y="1271" text-anchor="middle" font-size="11" fill="#854d0e">manual fallback</text>

  <text x="700" y="1292" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b" letter-spacing="3">BRIDGE  ·  FIX IDEA FORMATION</text>

  <text x="700" y="1328" text-anchor="middle" font-size="14" fill="#b45309">Phase 4 constraints  →  used automatically as fix idea input</text>
  <text x="700" y="1356" text-anchor="middle" font-size="14" fill="#92400e">or  --fix-idea flag  ·  or  user prompt if neither is available</text>
  <text x="700" y="1388" text-anchor="middle" font-size="13" font-style="italic" fill="#78350f">"constraints / variables / code sketch describing the intended fix"</text>

  <!-- converge REPRODUCED line into bridge -->
  <line x1="1078" y1="1138" x2="850"  y2="1290" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#aa)"/>

  <!-- connector bridge → C2 -->
  <line x1="700" y1="1420" x2="700" y2="1468" stroke="#f59e0b" stroke-width="2" marker-end="url(#aa)"/>

  <!-- ════════════════════════════════════════════
       CYCLE 2  (y 1476–2364)
       ════════════════════════════════════════════ -->
  <rect x="60" y="1476" width="1280" height="868" rx="18" fill="#0a1a0c" stroke="#16a34a" stroke-width="1.5" filter="url(#s1)"/>

  <!-- C2 header band -->
