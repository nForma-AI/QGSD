  <text x="292" y="936" text-anchor="middle" font-size="13" font-weight="600" fill="#93c5fd">State Extractor</text>
  <text x="292" y="960" text-anchor="middle" font-size="12" fill="#475569">model trace  vs  bug trace</text>
  <text x="292" y="982" text-anchor="middle" font-size="11" fill="#2d3748">extractFinalStates()</text>
  <text x="292" y="1001" text-anchor="middle" font-size="11" fill="#2d3748">ITF JSON  ·  lasso-aware</text>

  <line x1="456" y1="960" x2="492" y2="960" stroke="#1e40af" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Sub-box B -->
  <rect x="492" y="904" width="328" height="112" rx="10" fill="#091525" stroke="#1e3a8a" stroke-width="1"/>
  <text x="656" y="936" text-anchor="middle" font-size="13" font-weight="600" fill="#93c5fd">Diff Generator</text>
  <text x="656" y="960" text-anchor="middle" font-size="12" fill="#475569">field-level divergences</text>
  <text x="656" y="982" text-anchor="middle" font-size="11" fill="#2d3748">generateStateDiff()</text>
  <text x="656" y="1001" text-anchor="middle" font-size="11" fill="#2d3748">json-diff-ts</text>

  <line x1="820" y1="960" x2="856" y2="960" stroke="#1e40af" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Sub-box C -->
  <rect x="856" y="904" width="416" height="112" rx="10" fill="#091525" stroke="#1e3a8a" stroke-width="1"/>
  <text x="1064" y="936" text-anchor="middle" font-size="13" font-weight="600" fill="#93c5fd">Proposal Generator</text>
  <text x="1064" y="958" text-anchor="middle" font-size="12" fill="#475569">PROP-SV-{n}  ·  PROP-INV-{n}  ·  PROP-TEMP-{n}</text>
  <text x="1064" y="979" text-anchor="middle" font-size="11" fill="#2d3748">ranked by priority  ·  each with example skeleton</text>
  <text x="1064" y="998" text-anchor="middle" font-size="11" fill="#2d3748">generateCorrectionProposals()</text>

  <!-- connector from diagnostic down -->
  <line x1="700" y1="1040" x2="700" y2="1084" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="722" y="1066" font-size="12" fill="#334155">inject diagnostic into quorum context</text>

