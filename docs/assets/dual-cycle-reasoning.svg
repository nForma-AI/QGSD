<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 2600" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0e17"/>
      <stop offset="100%" stop-color="#0e1320"/>
    </linearGradient>
    <marker id="a"  markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#475569"/></marker>
    <marker id="ab" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#3b82f6"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#22c55e"/></marker>
    <marker id="aa" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#f59e0b"/></marker>
    <marker id="ap" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#a855f7"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#ef4444"/></marker>
    <filter id="s1"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/></filter>
    <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="5"  flood-color="#000" flood-opacity="0.40"/></filter>
  </defs>

  <rect width="1400" height="2600" fill="url(#bg)"/>

  <!-- ════════════════════════════════════════════
       TITLE  (y 0–180)
       ════════════════════════════════════════════ -->
  <text x="700" y="68"  text-anchor="middle" font-size="11" font-weight="600" fill="#2d3748" letter-spacing="4">NFORMA  ·  FORMAL REASONING ARCHITECTURE</text>
  <text x="700" y="112" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9">Dual-Cycle Formal Reasoning</text>
  <text x="700" y="148" text-anchor="middle" font-size="14" fill="#475569">Bug  →  Model Space  →  Verified Fix  →  Code</text>
  <line x1="100" y1="172" x2="1300" y2="172" stroke="#1a2233" stroke-width="1"/>

  <!-- ════════════════════════════════════════════
       ENTRY  (y 196–324)
       ════════════════════════════════════════════ -->
  <rect x="500" y="196" width="400" height="108" rx="14" fill="#12101f" stroke="#6366f1" stroke-width="1.5" filter="url(#s2)"/>
  <text x="700" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="3">ENTRY</text>
  <text x="700" y="263" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Bug Report</text>
  <text x="700" y="290" text-anchor="middle" font-size="13" fill="#475569">observed failure  ·  ITF trace (JSON)</text>

  <!-- connector 324→376 -->
  <line x1="700" y1="304" x2="700" y2="364" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ════════════════════════════════════════════
       CYCLE 1  (y 372–1148)
       ════════════════════════════════════════════ -->
  <rect x="60" y="372" width="1280" height="756" rx="18" fill="#0c1626" stroke="#1e40af" stroke-width="1.5" filter="url(#s1)"/>

  <!-- C1 header band -->
  <rect x="60" y="372" width="1280" height="64" rx="18" fill="#0f2847"/>
  <rect x="60" y="412" width="1280" height="24" fill="#0f2847"/>
  <text x="96"  y="412" font-size="12" font-weight="700" fill="#3b82f6" letter-spacing="3">CYCLE 1  ·  DIAGNOSTIC</text>
  <text x="1304" y="412" text-anchor="end" font-size="12" fill="#1e40af" letter-spacing="1">v0.38  ·  model-space bug reproduction loop</text>

  <!-- C1 Step 1: Initial Model  (y 456–572) -->
  <rect x="470" y="456" width="460" height="108" rx="12" fill="#091525" stroke="#1e3a5f" stroke-width="1" filter="url(#s2)"/>
  <text x="700" y="490" text-anchor="middle" font-size="11" fill="#2d4a6e" letter-spacing="2">STEP 1</text>
  <text x="700" y="520" text-anchor="middle" font-size="17" font-weight="600" fill="#e2e8f0">Initial Formal Model</text>
  <text x="700" y="548" text-anchor="middle" font-size="13" fill="#4a5568">TLA+  /  Alloy  specification</text>

  <!-- connector -->
  <line x1="700" y1="564" x2="700" y2="616" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="722" y="594" font-size="12" fill="#334155">run checker  ·  mode = diagnostic</text>

  <!-- C1 Step 2: Checker  (y 620–712) -->
  <rect x="470" y="620" width="460" height="88" rx="12" fill="#091525" stroke="#1e3a5f" stroke-width="1" filter="url(#s2)"/>
  <text x="700" y="654" text-anchor="middle" font-size="11" fill="#2d4a6e" letter-spacing="2">STEP 2</text>
  <text x="700" y="683" text-anchor="middle" font-size="17" font-weight="600" fill="#e2e8f0">Model Checker  (TLC / Alloy)</text>

  <!-- connector to diamond -->
  <line x1="700" y1="708" x2="700" y2="736" stroke="#334155" stroke-width="1.5"/>

  <!-- Diamond  (center 700,772) -->
  <polygon points="700,736 780,772 700,808 620,772" fill="#091525" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="700" y="777" text-anchor="middle" font-size="13" font-weight="600" fill="#60a5fa">violation?</text>

  <!-- YES → REPRODUCED  (right) -->
  <line x1="780" y1="772" x2="960" y2="772" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>
  <text x="870" y="760" text-anchor="middle" font-size="12" fill="#22c55e">YES</text>
  <rect x="960" y="744" width="236" height="56" rx="12" fill="#052e16" stroke="#22c55e" stroke-width="1.5" filter="url(#s2)"/>
  <text x="1078" y="777" text-anchor="middle" font-size="16" font-weight="700" fill="#86efac">REPRODUCED ✓</text>

  <!-- NO → down -->
  <line x1="700" y1="808" x2="700" y2="852" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="722" y="834" font-size="12" fill="#f87171">NO — model is INCOMPLETE</text>

