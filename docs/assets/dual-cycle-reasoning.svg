  <rect x="60" y="1516" width="1280" height="24" fill="#042b12"/>
  <text x="96"  y="1518" font-size="12" font-weight="700" fill="#22c55e" letter-spacing="3">CYCLE 2  ·  SOLUTION SIMULATION</text>
  <text x="1304" y="1518" text-anchor="end" font-size="12" fill="#16a34a" letter-spacing="1">v0.39  ·  model-space fix validation loop</text>

  <!-- C2 Step 1: Intent Normalizer  (y 1560–1672) -->
  <rect x="450" y="1560" width="500" height="108" rx="12" fill="#071409" stroke="#14532d" stroke-width="1" filter="url(#s2)"/>
  <text x="700" y="1596" text-anchor="middle" font-size="11" fill="#166534" letter-spacing="2">STEP 1</text>
  <text x="700" y="1626" text-anchor="middle" font-size="17" font-weight="600" fill="#e2e8f0">Intent Normalizer</text>
  <text x="700" y="1652" text-anchor="middle" font-size="13" fill="#475569">constraints  ·  variables  ·  code snippets</text>

  <!-- connector -->
  <line x1="700" y1="1668" x2="700" y2="1720" stroke="#166534" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="722" y="1698" font-size="12" fill="#166534">normalized fix intent</text>

  <!-- C2 Step 2: Consequence Model  (y 1724–1840) -->
  <rect x="410" y="1724" width="580" height="108" rx="12" fill="#071409" stroke="#14532d" stroke-width="1" filter="url(#s2)"/>
  <text x="700" y="1760" text-anchor="middle" font-size="11" fill="#166534" letter-spacing="2">STEP 2</text>
  <text x="700" y="1790" text-anchor="middle" font-size="17" font-weight="600" fill="#e2e8f0">Consequence Model Generator</text>
  <text x="700" y="1816" text-anchor="middle" font-size="13" fill="#475569">reproducing model  +  mutation  →  candidate fix model</text>

  <!-- connector -->
  <line x1="700" y1="1832" x2="700" y2="1884" stroke="#166534" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- C2 Step 3: Gates container  (y 1888–2136) -->
  <rect x="100" y="1888" width="1200" height="256" rx="12" fill="#071409" stroke="#14532d" stroke-width="1"/>
  <text x="700" y="1920" text-anchor="middle" font-size="11" font-weight="700" fill="#166534" letter-spacing="2">STEP 3  ·  CONVERGENCE GATE RUNNER</text>

  <!-- Gate 1 -->
  <rect x="128" y="1940" width="336" height="172" rx="10" fill="#081220" stroke="#1e3a8a" stroke-width="1"/>
  <text x="296" y="1976" text-anchor="middle" font-size="11" font-weight="700" fill="#60a5fa" letter-spacing="2">GATE 1</text>
  <text x="296" y="2004" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0">Invariants Hold</text>
  <text x="296" y="2032" text-anchor="middle" font-size="13" fill="#475569">mode = validation</text>
  <text x="296" y="2056" text-anchor="middle" font-size="13" fill="#374151">no violation</text>
  <text x="296" y="2076" text-anchor="middle" font-size="14" font-weight="600" fill="#86efac">→  PASS</text>
  <text x="296" y="2098" text-anchor="middle" font-size="11" fill="#1e3a5f">fix doesn't break model invariants</text>

  <line x1="464" y1="2026" x2="500" y2="2026" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>

  <!-- Gate 2 -->
  <rect x="500" y="1940" width="336" height="172" rx="10" fill="#1a0800" stroke="#c2410c" stroke-width="1"/>
  <text x="668" y="1976" text-anchor="middle" font-size="11" font-weight="700" fill="#fb923c" letter-spacing="2">GATE 2</text>
  <text x="668" y="2004" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0">Bug Resolved</text>
  <text x="668" y="2032" text-anchor="middle" font-size="13" fill="#c2410c">mode = diagnostic  (inverted)</text>
  <text x="668" y="2056" text-anchor="middle" font-size="13" fill="#374151">no violation  =  bug is gone</text>
  <text x="668" y="2076" text-anchor="middle" font-size="14" font-weight="600" fill="#86efac">→  PASS</text>
  <text x="668" y="2098" text-anchor="middle" font-size="11" fill="#7c2d12">same mode flag, inverted semantics</text>

  <line x1="836" y1="2026" x2="872" y2="2026" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>

  <!-- Gate 3 -->
  <rect x="872" y="1940" width="400" height="172" rx="10" fill="#081220" stroke="#1e3a8a" stroke-width="1"/>
  <text x="1072" y="1976" text-anchor="middle" font-size="11" font-weight="700" fill="#60a5fa" letter-spacing="2">GATE 3</text>
  <text x="1072" y="2004" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0">No Regressions</text>
  <text x="1072" y="2032" text-anchor="middle" font-size="13" fill="#475569">mode = validation  ·  neighbor models</text>
  <text x="1072" y="2056" text-anchor="middle" font-size="13" fill="#374151">all still pass</text>
  <text x="1072" y="2076" text-anchor="middle" font-size="14" font-weight="600" fill="#86efac">→  PASS</text>
  <text x="1072" y="2098" text-anchor="middle" font-size="11" fill="#1e3a5f">write-once verdict lock per gate</text>

  <!-- verdicts note -->
  <text x="700" y="2132" text-anchor="middle" font-size="11" fill="#1e3a2e" letter-spacing="0.5">gate-verdicts.json  ·  write-once semantics  ·  monotonic convergence guarantee</text>

  <!-- Branch line from gates -->
  <line x1="700" y1="2144" x2="700" y2="2192" stroke="#334155" stroke-width="1.5"/>

  <!-- NOT ALL PASS → left loop -->
  <line x1="700" y1="2192" x2="164" y2="2192" stroke="#ef4444" stroke-width="2"/>
  <line x1="164" y1="2192" x2="164" y2="1700" stroke="#ef4444" stroke-width="2" stroke-dasharray="7,5" marker-end="url(#ar)"/>
  <text x="112" y="1948" text-anchor="middle" font-size="11" fill="#b91c1c" transform="rotate(-90 112 1948)">refine fix idea  ·  iterate  ≤  max_iterations</text>
  <text x="420" y="2184" text-anchor="end" font-size="12" fill="#f87171">NOT ALL PASS</text>

  <!-- ALL PASS → CONVERGED -->
  <line x1="700" y1="2192" x2="1120" y2="2192" stroke="#22c55e" stroke-width="2"/>
  <line x1="1120" y1="2192" x2="1120" y2="2220" stroke="#22c55e" stroke-width="2"/>
  <rect x="948" y="2220" width="344" height="64" rx="12" fill="#052e16" stroke="#22c55e" stroke-width="1.5" filter="url(#s2)"/>
  <text x="1120" y="2257" text-anchor="middle" font-size="18" font-weight="700" fill="#86efac">CONVERGED ✓</text>
  <text x="868" y="2184" font-size="12" fill="#22c55e">ALL 3 PASS</text>

  <!-- shared foundation strip (bottom of C2) -->
  <rect x="100" y="2288" width="1200" height="48" rx="8" fill="#050e07" stroke="#0d2410" stroke-width="1"/>
  <text x="700" y="2309" text-anchor="middle" font-size="11" fill="#1e4a2e" letter-spacing="1">SHARED FOUNDATION  (v0.39-01)</text>
  <text x="700" y="2327" text-anchor="middle" font-size="11" fill="#143020">verification-mode.cjs  ·  parse-tlc-counterexample.cjs  ·  diagnostic-diff-generator.cjs  ·  config.json → max_iterations</text>

  <!-- CONVERGED → Implementation connector -->
  <line x1="1120" y1="2284" x2="760"  y2="2356" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ag)"/>
  <line x1="700"  y1="2344" x2="700"  y2="2380" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- ════════════════════════════════════════════
       IMPLEMENTATION  (y 2380–2520)
       ════════════════════════════════════════════ -->
  <rect x="60" y="2388" width="1280" height="120" rx="14" fill="#0f0a1e" stroke="#7c3aed" stroke-width="1.5" filter="url(#s2)"/>
  <text x="700" y="2428" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed" letter-spacing="3">IMPLEMENTATION  ·  model-driven-fix  Phase 5</text>
  <text x="700" y="2464" text-anchor="middle" font-size="18" font-weight="600" fill="#e2e8f0">Write production code</text>
  <text x="700" y="2494" text-anchor="middle" font-size="13" fill="#581c87">First line of code written only after both cycles converge in model space</text>

  <!-- ════════════════════════════════════════════
       FOOTER NOTE
       ════════════════════════════════════════════ -->
  <text x="700" y="2572" text-anchor="middle" font-size="11" fill="#1e293b">Gate 2 reuses mode=diagnostic with inverted semantics: in Cycle 1 "no violation = model incomplete"; in Cycle 2 Gate 2 "no violation = bug is resolved"</text>

</svg>
