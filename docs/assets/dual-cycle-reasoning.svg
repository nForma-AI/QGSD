  <rect x="100" y="856" width="1200" height="184" rx="12" fill="#070f1a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="700" y="888" text-anchor="middle" font-size="11" font-weight="700" fill="#2d4a6e" letter-spacing="2">STEP 3  ·  DIAGNOSTIC PIPELINE</text>

