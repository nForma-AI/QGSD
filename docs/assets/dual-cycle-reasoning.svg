  <rect x="280" y="1088" width="840" height="100" rx="12" fill="#091525" stroke="#1e3a5f" stroke-width="1" filter="url(#s2)"/>
  <text x="700" y="1122" text-anchor="middle" font-size="11" fill="#2d4a6e" letter-spacing="2">STEP 4  ·  QUORUM WORKERS</text>
  <text x="700" y="1155" text-anchor="middle" font-size="16" font-weight="600" fill="#e2e8f0">Claude  ·  Codex  ·  Gemini  ·  Copilot  ·  OpenCode</text>

  <!-- Feedback loop arc (left side) -->
  <path d="M 280 1138 Q 108 1138 108 680 Q 108 490 470 504" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-dasharray="7,5" marker-end="url(#ab)"/>
  <text x="60" y="820" text-anchor="middle" font-size="11" fill="#1e40af" transform="rotate(-90 60 820)">refined model  ·  iterate  ≤  max_iterations</text>

  <!-- REPRODUCED arc down to bridge area -->
  <line x1="1078" y1="800" x2="1078" y2="1138" stroke="#22c55e" stroke-width="1" stroke-dasharray="6,4"/>

