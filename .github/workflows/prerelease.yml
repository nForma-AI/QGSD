name: Prerelease Publish

on:
  push:
    tags:
      - 'v*-rc*'
      - 'v*-next*'

jobs:
  test:
    name: Pre-publish tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g npm@latest
      - name: Check CHANGELOG entry exists
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          BASE_VERSION="${TAG_VERSION%%-*}"
          if ! grep -qE "^## \[${BASE_VERSION}\]|^## \[${TAG_VERSION}\]" CHANGELOG.md; then
            echo "ERROR: No CHANGELOG entry found for ${TAG_VERSION} or ${BASE_VERSION}"
            echo "Add a '## [${BASE_VERSION}]' section to CHANGELOG.md before releasing"
            exit 1
          fi
      - run: npm ci --ignore-scripts
      - run: npm run build:hooks && npm run build:machines
      - run: npm run check:assets
      - run: npm run lint:isolation
      - run: npm run test:ci
      - run: npm run test:tui
      - name: Verify package contents
        run: |
          echo "=== Package dry-run ==="
          npm pack --dry-run 2>&1 | grep -E 'total files|package size|📦'
          echo ""
          echo "=== Checking for test files ==="
          count=$(npm pack --dry-run 2>&1 | grep -c '\.test\.' || true)
          if [ "$count" -gt 0 ]; then
            echo "ERROR: $count test files found in package"
            exit 1
          fi
          echo "OK: 0 test files in package"

  publish:
    name: Publish to npm (@next)
    needs: test
    runs-on: ubuntu-latest
    environment: npm-publish
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@nforma.ai'
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build:hooks
      - name: Stamp prerelease version from tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" = "$TAG_VERSION" ]; then
            echo "Version already at ${TAG_VERSION}, skipping stamp"
          else
            echo "Stamping version: ${TAG_VERSION}"
            npm version "$TAG_VERSION" --no-git-tag-version
          fi
      - name: Publish to npm with @next tag
        run: npm publish --access public --provenance --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Print install command
        run: |
          VERSION=$(cat package.json | grep '"version"' | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo ""
          echo "=== Published @nforma.ai/nforma@${VERSION} ==="
          echo "  npx @nforma.ai/nforma@next"
          echo "  npx @nforma.ai/nforma@${VERSION}"
