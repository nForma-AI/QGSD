name: Release coderlm Cross-Compiled Binaries

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.binary_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            binary_name: coderlm-darwin-arm64
            use_cross: false
          - target: x86_64-apple-darwin
            runner: macos-13
            binary_name: coderlm-darwin-x64
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: coderlm-linux-x64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: coderlm-linux-arm64
            use_cross: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for arm64 Linux)
        if: ${{ matrix.use_cross }}
        uses: cross-rs/cross-action@v1

      - name: Build release binary
        run: |
          if ${{ matrix.use_cross }}; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/coderlm ${{ matrix.binary_name }}

      - name: Generate SHA256 checksum
        run: |
          sha256sum ${{ matrix.binary_name }} > ${{ matrix.binary_name }}.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}
          retention-days: 1

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}-checksum
          path: ${{ matrix.binary_name }}.sha256
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Verify all binaries present
        run: |
          BINARIES=(
            "coderlm-darwin-arm64"
            "coderlm-darwin-x64"
            "coderlm-linux-x64"
            "coderlm-linux-arm64"
          )

          for binary in "${BINARIES[@]}"; do
            if [ ! -f "$binary" ]; then
              echo "ERROR: Missing binary $binary"
              exit 1
            fi
            echo "✓ Found $binary"
          done

          echo "All 4 binaries verified"

      - name: Verify checksums
        run: |
          BINARIES=(
            "coderlm-darwin-arm64"
            "coderlm-darwin-x64"
            "coderlm-linux-x64"
            "coderlm-linux-arm64"
          )

          for binary in "${BINARIES[@]}"; do
            if [ ! -f "$binary.sha256" ]; then
              echo "ERROR: Missing checksum file $binary.sha256"
              exit 1
            fi
            # Verify checksum is valid
            sha256sum -c "$binary.sha256"
            echo "✓ Checksum verified for $binary"
          done

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ github.ref_name }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            coderlm-darwin-arm64 \
            coderlm-darwin-x64 \
            coderlm-linux-x64 \
            coderlm-linux-arm64 \
            coderlm-darwin-arm64.sha256 \
            coderlm-darwin-x64.sha256 \
            coderlm-linux-x64.sha256 \
            coderlm-linux-arm64.sha256

      - name: Upload to existing release
        if: steps.check_release.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            coderlm-darwin-arm64 \
            coderlm-darwin-x64 \
            coderlm-linux-x64 \
            coderlm-linux-arm64 \
            coderlm-darwin-arm64.sha256 \
            coderlm-darwin-x64.sha256 \
            coderlm-linux-x64.sha256 \
            coderlm-linux-arm64.sha256 \
            --clobber
