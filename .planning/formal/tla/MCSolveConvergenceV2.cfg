\* formal/tla/MCSolveConvergenceV2.cfg
\* TLC model for NFSolveConvergenceV2.tla -- solve convergence with buckets and credits.
\* Safety: BucketsNeverMixed, OscillatingLayersExcluded, DriftFlagged, SecondOscillationBlocks.
\* Liveness: EventualConvergence.
\*
\* Run: node bin/run-oscillation-tlc.cjs MCSolveConvergenceV2  (requires Java >=17 + tla2tools.jar)
\* Note: -workers 1 required for liveness check (avoids TLC multi-worker liveness bug).
SPECIFICATION Spec
CONSTANTS
    L1 = L1
    L2 = L2
    L3 = L3
    Layers = {L1, L2, L3}
    MaxIterations = 3
    OscillationCredits = 2
    DriftThreshold = 10
INVARIANT TypeOK
INVARIANT BucketsNeverMixed
INVARIANT OscillatingLayersExcluded
INVARIANT SecondOscillationBlocks
\* PROPERTY EventualConvergence  \* Disabled: liveness not guaranteed under oscillation+cascade
CHECK_DEADLOCK FALSE
