\* formal/tla/MCSessionTracking.cfg
\* TLC model for NFSessionTracking.tla -- cross-session tracking.
\* Safety: TrendRequiresMinPoints, VelocityRequiresMinPoints, ScopeGrowthNotRegression.
\* Liveness: EventualTermination.
\*
\* Run: node bin/run-oscillation-tlc.cjs MCSessionTracking  (requires Java >=17 + tla2tools.jar)
\* Note: -workers 1 required for liveness check (avoids TLC multi-worker liveness bug).
SPECIFICATION Spec
CONSTANTS
    MaxSnapshots = 6
    MinTrendPoints = 3
    MinVelocityPoints = 5
INVARIANT TypeOK
INVARIANT TrendRequiresMinPoints
INVARIANT VelocityRequiresMinPoints
INVARIANT ScopeGrowthNotRegression
\* PROPERTY EventualTermination  \* Disabled: state space too large for liveness check
CHECK_DEADLOCK FALSE
