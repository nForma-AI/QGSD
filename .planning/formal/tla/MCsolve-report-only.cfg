\* MCsolve-report-only.cfg
\* Verifies the --report-only mode never enters remediation loop.
\*
\* Scenario: ReportOnly=TRUE, 3 max iterations, residual 0-5.
\* Key property: ReportOnlyNeverRemediates must hold in ALL states.

SPECIFICATION Spec

CONSTANTS
    MaxIterations = 3
    MaxResidual = 5
    ReportOnly = TRUE

INVARIANTS
    TypeOK
    DiagnosePrecedesRemediate
    ClassifyAfterDiagnose
    LoopBounded
    ReportOnlyNeverRemediates

PROPERTIES
    EventualTermination
    EventualReport

CHECK_DEADLOCK FALSE
