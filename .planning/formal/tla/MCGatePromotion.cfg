\* formal/tla/MCGatePromotion.cfg
\* TLC model for NFGatePromotion.tla -- gate promotion lifecycle.
\* Safety: FlipFlopPreventsPromotion, CooldownEnforced, NoDuplicateLogEntries.
\* Liveness: EventualTermination.
\*
\* Run: node bin/run-oscillation-tlc.cjs MCGatePromotion  (requires Java >=17 + tla2tools.jar)
\* Note: -workers 1 required for liveness check (avoids TLC multi-worker liveness bug).
SPECIFICATION Spec
CONSTANTS
    MaxSessions = 5
    CooldownThreshold = 3
    FlipFlopLimit = 3
INVARIANT TypeOK
INVARIANT FlipFlopPreventsPromotion
INVARIANT CooldownEnforced
INVARIANT NoDuplicateLogEntries
\* PROPERTY EventualTermination  \* Disabled: liveness not guaranteed under flip-flop scenarios
CHECK_DEADLOCK FALSE
