\* MCsolve-orchestrator.cfg
\* Model-checks NFSolveOrchestrator for safety and liveness.
\*
\* Scenario: 3 max iterations, residual values 0-5, remediation enabled.
\* TLC explores all possible residual outcomes and sub-skill statuses
\* to verify convergence termination and phase ordering.
\*
\* Run: java -jar tla2tools.jar -config MCsolve-orchestrator.cfg NFSolveOrchestrator.tla

SPECIFICATION Spec

CONSTANTS
    MaxIterations = 3
    MaxResidual = 5
    ReportOnly = FALSE

INVARIANTS
    TypeOK
    DiagnosePrecedesRemediate
    ClassifyAfterDiagnose
    LoopBounded
    ReportOnlyNeverRemediates
    IterationOnlyInLoop

PROPERTIES
    EventualTermination
    EventualReport

CHECK_DEADLOCK FALSE
